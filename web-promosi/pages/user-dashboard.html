<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Promosi Task Manager</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/toast.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <h2><i class="fas fa-chalkboard-user"></i> Dashboard Promosi - Pekerja</h2>
        <div class="nav-links">
            <a onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>
    <div class="container">
        <div class="welcome-banner">
            <h2><i class="fas fa-smile-wink"></i> Selamat Bekerja!</h2>
            <p>Kerjakan tugas promosi di bawah ini. Setiap hari Anda akan mendapatkan <strong>5 tugas baru</strong> secara otomatis.</p>
            <p><i class="fas fa-info-circle"></i> <strong>Tips:</strong> Klik tombol Download untuk menyimpan gambar, atau Buka Grup untuk langsung menuju target promosi.</p>
        </div>
        <div class="card">
            <h3><i class="fas fa-tasks"></i> Tugas Promosi Hari Ini</h3>
            <div id="userTasksContainer">Loading...</div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/user.js"></script>
    <script>
        // Proteksi halaman user
        const user = checkSession();
        if (!user || user.role !== 'user') {
            window.location.href = '../index.html';
        } else {
            showUserTasks();
        }
    </script>
</body>
</html>
